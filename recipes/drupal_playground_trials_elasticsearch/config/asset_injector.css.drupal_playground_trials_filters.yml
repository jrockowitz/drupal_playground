langcode: en
status: true
# cspell:ignore minmax
dependencies:
  module:
    - asset_injector
id: drupal_playground_trials_filters
label: 'Drupal Playground Trials Filters'
code: |-
  /* Stack the exposed form controls in a predictable order on smaller screens. */
  body.path-trials .view-filters form.views-exposed-form.bef-exposed-form {
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  /* Keep the keyword search at the top and let it span the full filter width. */
  body.path-trials .view-filters .form-item-keys {
    order: 1;
    width: 100%;
    margin: 0;
  }

  /* Let the search input fill the available column without overflow. */
  body.path-trials .view-filters .form-item-keys input {
    width: 100%;
    max-width: 100%;
    box-sizing: border-box;
  }

  /* Style the autocomplete dropdown to feel closer to Olivero's form language. */
  body.path-trials .ui-autocomplete {
    padding: 0.5rem 0;
    border: 1px solid var(--color--gray-30, #c4d0dc);
    border-radius: 0 0 0.5rem 0.5rem;
    background: var(--color--white, #fff);
    box-shadow: 0 0.75rem 1.5rem rgba(27, 39, 51, 0.12);
  }

  /* Add breathing room to each suggestion and use Olivero's primary blue. */
  body.path-trials .ui-autocomplete .ui-menu-item-wrapper,
  body.path-trials .ui-autocomplete .ui-menu-item a {
    display: block;
    padding: 0.7rem 1rem;
    color: var(--color--primary-40);
    line-height: 1.35;
    text-decoration: none;
  }

  /* Highlight the active autocomplete row with Olivero-aligned contrast. */
  body.path-trials .ui-autocomplete .ui-menu-item-wrapper.ui-state-active,
  body.path-trials .ui-autocomplete .ui-menu-item-wrapper:focus,
  body.path-trials .ui-autocomplete .ui-menu-item a.ui-state-active,
  body.path-trials .ui-autocomplete .ui-menu-item a:focus {
    margin: 0;
    border: 0;
    background: var(--color--primary-80);
    color: var(--color--primary-30);
  }

  /* Separate stacked suggestions without adding heavy borders around the menu. */
  body.path-trials .ui-autocomplete .ui-menu-item + .ui-menu-item {
    border-top: 1px solid rgba(19, 58, 88, 0.08);
  }

  /* Keep the manual submit button directly below the keyword field. */
  body.path-trials .view-filters .form-actions {
    order: 2;
    margin: 0;
  }

  /* Keep sidebar filters in a clear clinical-search order. */
  body.path-trials .view-filters .form-item-condition {
    order: 3;
    margin: 0;
  }

  body.path-trials .view-filters fieldset[data-drupal-selector="edit-overall-status"] {
    order: 4;
    margin: 0;
  }

  body.path-trials .view-filters fieldset[data-drupal-selector="edit-phase"] {
    order: 5;
    margin: 0;
  }

  body.path-trials .view-filters fieldset[data-drupal-selector="edit-study-type"] {
    order: 6;
    margin: 0;
  }

  body.path-trials .view-filters fieldset[data-drupal-selector="edit-sex"] {
    order: 7;
    margin: 0;
  }

  body.path-trials .view-filters fieldset[data-drupal-selector="edit-age-group"] {
    order: 8;
    margin: 0;
  }

  /* Give age-group radios the same vertical rhythm as the other single-choice sets. */
  body.path-trials .view-filters fieldset[data-drupal-selector="edit-phase"] .form-radios,
  body.path-trials .view-filters fieldset[data-drupal-selector="edit-age-group"] .form-radios {
    display: grid;
    gap: 0.625rem;
  }

  body.path-trials .view-filters fieldset[data-drupal-selector="edit-phase"] .form-type-radio,
  body.path-trials .view-filters fieldset[data-drupal-selector="edit-age-group"] .form-type-radio {
    margin: 0;
  }

  /* Remove default list styling from nested Better Exposed Filters checkboxes. */
  body.path-trials .form-checkboxes.bef-checkboxes.bef-nested ul,
  body.path-trials .form-checkboxes.bef-checkboxes.bef-nested li {
    list-style: none;
    margin-left: 0;
    padding-left: 0;
  }

  /* Hide empty teaser metadata blocks to reduce visual noise in results. */
  body.path-trials .view-content .teaser__meta:empty {
    display: none;
  }

  /* Keep the empty state visually separated from the filter stack on narrow screens. */
  body.path-trials .view-empty {
    display: block;
    margin-top: 1.5rem;
  }

  /* Switch to a two-column search layout once there is room for a sidebar. */
  @media (min-width: 700px) {
    body.path-trials .view {
      display: grid;
      grid-template-columns: minmax(280px, 35%) minmax(0, 65%);
      column-gap: 2rem;
      row-gap: 0.5rem;
      align-items: start;
    }

    /* Pin the exposed filters into the left column of the desktop layout. */
    body.path-trials .view-filters {
      grid-column: 1;
      margin: 0;
    }

    /* Remove extra form margin so the filter column aligns with the grid. */
    body.path-trials form.views-exposed-form.bef-exposed-form {
      margin: 0;
    }

    /* Place the filter summary above the results column. */
    body.path-trials .view-header {
      grid-column: 2;
      align-self: start;
      margin: 0 0 1rem 0;
    }

    /* Keep result content in the right column and allow long text to shrink. */
    body.path-trials .view-content,
    body.path-trials .view-empty {
      grid-column: 2;
      align-self: start;
      min-width: 0;
      margin-top: 0;
    }
  }
conditions_require_all: true
conditions:
  request_path:
    id: request_path
    negate: false
    pages: /trials
  current_theme:
    id: current_theme
    negate: false
    theme: olivero
contexts: {  }
media: all
preprocess: true
