langcode: en
status: true
dependencies:
  config:
    - field.field.node.trial.trial_nct_id
    - node.type.trial
    - search_api.server.drupal_playground_trials
  module:
    - node
    - search_api
id: drupal_playground_trials
name: 'Drupal Playground Trials'
description: 'Clinical Trials search index powered by Elasticsearch.'
read_only: false
field_settings:
  created:
    label: 'Created on'
    datasource_id: 'entity:node'
    property_path: created
    type: date
    dependencies:
      module:
        - node
  title:
    label: Title
    datasource_id: 'entity:node'
    property_path: title
    type: text
    boost: 8
    dependencies:
      module:
        - node
  trial_nct_id:
    label: 'NCT ID'
    datasource_id: 'entity:node'
    property_path: trial_nct_id
    type: string
    dependencies:
      config:
        - field.field.node.trial.trial_nct_id
processor_settings:
  add_url:
    weights:
      preprocess_index: -30
  aggregated_field:
    weights:
      add_properties: 20
  content_access:
    weights:
      preprocess_index: -6
      preprocess_query: -4
  entity_status:
    weights:
      preprocess_index: -10
  html_filter:
    weights:
      preprocess_index: -3
      preprocess_query: -6
    fields:
      - title
    title: true
    alt: true
    tags:
      h1: 5
      h2: 3
      h3: 2
      string: 2
      b: 2
  ignorecase:
    weights:
      preprocess_index: -5
      preprocess_query: -8
    fields:
      - title
      - trial_nct_id
  tokenizer:
    weights:
      preprocess_index: -2
      preprocess_query: -5
    fields:
      - title
    spaces: ''
    overlap_cjk: 1
    minimum_word_size: '3'
  transliteration:
    weights:
      preprocess_index: -4
      preprocess_query: -7
    fields:
      - title
      - trial_nct_id
datasource_settings:
  'entity:node':
    bundles:
      default: false
      selected:
        trial: trial
    languages:
      default: true
      selected: {  }
tracker_settings:
  default:
    indexing_order: fifo
options:
  cron_limit: 50
  delete_on_fail: true
  index_directly: true
  track_changes_in_references: true
server: drupal_playground_trials
