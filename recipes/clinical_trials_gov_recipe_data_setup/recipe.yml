name: 'ClinicalTrials.gov Data Setup Recipe'
description: >
  Installs and configures the ClinicalTrials.gov data workflow using the
  reusable setup config action.
type: 'Site'
recipes:
  - clinical_trials_gov_recipe_content
  - clinical_trials_gov_recipe_assets
input:
  query:
    data_type: string
    description: 'The ClinicalTrials.gov API query used to discover fields and build the migration configuration.'
    default:
      source: value
      value: 'query.cond=Cancer&query.locn=New%20York&filter.overallStatus=RECRUITING%7CNOT_YET_RECRUITING'
install:
  - custom_field
  - field_group
  - migrate_plus
  - migrate_tools
  - readonly_field_widget
  - clinical_trials_gov
  - clinical_trials_gov_report
config:
  strict: false
  actions:
    clinical_trials_gov.settings:
      setUp:
        query: ${query}
