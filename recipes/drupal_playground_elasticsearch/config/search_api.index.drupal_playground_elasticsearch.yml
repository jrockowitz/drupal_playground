langcode: en
status: true
dependencies:
  config:
    - field.field.node.article.body
    - field.field.node.article.field_tags
    - field.storage.node.body
    - node.type.article
    - search_api.server.drupal_playground_elasticsearch
  module:
    - node
    - search_api
id: drupal_playground_elasticsearch
name: 'Drupal Playground Elasticsearch'
description: 'Article search index powered by Elasticsearch.'
read_only: false
field_settings:
  author:
    label: 'Author name'
    datasource_id: 'entity:node'
    property_path: 'uid:entity:name'
    type: string
    dependencies:
      module:
        - node
  body:
    label: Body
    datasource_id: 'entity:node'
    property_path: body
    type: text
    dependencies:
      config:
        - field.field.node.article.body
        - field.storage.node.body
  created:
    label: 'Authored on'
    datasource_id: 'entity:node'
    property_path: created
    type: date
    dependencies:
      module:
        - node
  field_tags:
    label: Tags
    datasource_id: 'entity:node'
    property_path: field_tags
    type: integer
    dependencies:
      config:
        - field.field.node.article.field_tags
  title:
    label: Title
    datasource_id: 'entity:node'
    property_path: title
    type: text
    boost: 8
    dependencies:
      module:
        - node
processor_settings:
  add_url:
    weights:
      preprocess_index: -30
  aggregated_field:
    weights:
      add_properties: 20
  content_access:
    weights:
      preprocess_index: -6
      preprocess_query: -4
  entity_status:
    weights:
      preprocess_index: -10
  html_filter:
    weights:
      preprocess_index: -3
      preprocess_query: -6
    fields:
      - body
      - title
    title: true
    alt: true
    tags:
      h1: 5
      h2: 3
      h3: 2
      string: 2
      b: 2
  ignorecase:
    weights:
      preprocess_index: -5
      preprocess_query: -8
    fields:
      - author
      - body
      - title
  tokenizer:
    weights:
      preprocess_index: -2
      preprocess_query: -5
    fields:
      - body
      - title
    spaces: ''
    overlap_cjk: 1
    minimum_word_size: '3'
  transliteration:
    weights:
      preprocess_index: -4
      preprocess_query: -7
    fields:
      - author
      - body
      - title
datasource_settings:
  'entity:node':
    bundles:
      default: false
      selected:
        article: article
    languages:
      default: true
      selected: {  }
tracker_settings:
  default:
    indexing_order: fifo
options:
  cron_limit: 50
  delete_on_fail: true
  index_directly: true
  track_changes_in_references: true
server: drupal_playground_elasticsearch
