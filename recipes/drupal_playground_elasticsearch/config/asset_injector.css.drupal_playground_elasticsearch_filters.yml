langcode: en
status: true
dependencies:
  module:
    - asset_injector
id: drupal_playground_elasticsearch_filters
label: 'Drupal Playground Elasticsearch Filters'
code: |-
  /* Remove default list styling from nested Better Exposed Filters checkboxes. */
  body.path-elasticsearch .form-checkboxes.bef-checkboxes.bef-nested ul,
  body.path-elasticsearch .form-checkboxes.bef-checkboxes.bef-nested li {
    list-style: none;
    margin-left: 0;
    padding-left: 0;
  }

  /* Stack the exposed form controls in a predictable order on smaller screens. */
  body.path-elasticsearch .view-filters form.views-exposed-form.bef-exposed-form {
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  /* Keep the keyword search at the top and let it span the full filter width. */
  body.path-elasticsearch .view-filters .form-item-keys {
    order: 1;
    width: 100%;
    margin: 0;
  }

  /* Let the search input fill the available column without overflow. */
  body.path-elasticsearch .view-filters .form-item-keys input {
    width: 100%;
    max-width: 100%;
    box-sizing: border-box;
  }

  /* Style the autocomplete dropdown to feel closer to Olivero's form language. */
  body.path-elasticsearch .ui-autocomplete {
    padding: 0.5rem 0;
    border: 1px solid var(--color--gray-30, #c4d0dc);
    border-radius: 0 0 0.5rem 0.5rem;
    background: var(--color--white, #fff);
    box-shadow: 0 0.75rem 1.5rem rgba(27, 39, 51, 0.12);
  }

  /* Add breathing room to each suggestion and use Olivero's primary blue. */
  body.path-elasticsearch .ui-autocomplete .ui-menu-item-wrapper,
  body.path-elasticsearch .ui-autocomplete .ui-menu-item a {
    display: block;
    padding: 0.7rem 1rem;
    color: var(--color--primary-40);
    line-height: 1.35;
    text-decoration: none;
  }

  /* Highlight the active autocomplete row with Olivero-aligned contrast. */
  body.path-elasticsearch .ui-autocomplete .ui-menu-item-wrapper.ui-state-active,
  body.path-elasticsearch .ui-autocomplete .ui-menu-item-wrapper:focus,
  body.path-elasticsearch .ui-autocomplete .ui-menu-item a.ui-state-active,
  body.path-elasticsearch .ui-autocomplete .ui-menu-item a:focus {
    margin: 0;
    border: 0;
    background: var(--color--primary-80);
    color: var(--color--primary-30);
  }

  /* Separate stacked suggestions without adding heavy borders around the menu. */
  body.path-elasticsearch .ui-autocomplete .ui-menu-item + .ui-menu-item {
    border-top: 1px solid rgba(19, 58, 88, 0.08);
  }

  /* Keep the manual submit button directly below the keyword field. */
  body.path-elasticsearch .view-filters .form-actions {
    order: 2;
    margin: 0;
  }

  /* Push the remaining facet fieldsets below search and actions. */
  body.path-elasticsearch .view-filters fieldset {
    order: 3;
    margin: 0;
  }

  /* Hide empty teaser metadata blocks to reduce visual noise in results. */
  body.path-elasticsearch .view-content .teaser__meta:empty {
    display: none;
  }

  /* Switch to a two-column search layout once there is room for a sidebar. */
  @media (min-width: 900px) {
    body.path-elasticsearch .view {
      display: grid;
      grid-template-columns: minmax(280px, 35%) minmax(0, 65%);
      grid-template-areas:
        "filters summary"
        "filters results";
      column-gap: 2rem;
      row-gap: 0.5rem;
      align-items: start;
    }

    /* Pin the exposed filters into the left column of the desktop layout. */
    body.path-elasticsearch .view-filters {
      grid-area: filters;
      margin: 0;
    }

    /* Remove extra form margin so the filter column aligns with the grid. */
    body.path-elasticsearch form.views-exposed-form.bef-exposed-form {
      margin: 0;
    }

    /* Place the filter summary above the results column. */
    body.path-elasticsearch .view-header {
      grid-area: summary;
      margin: 0 0 1rem 0;
    }

    /* Keep result content in the right column and allow long text to shrink. */
    body.path-elasticsearch .view-content,
    body.path-elasticsearch .view-empty {
      grid-area: results;
      min-width: 0;
    }

    /* Stop Olivero from hanging teaser images into the left gutter. */
    body.path-elasticsearch .view-content .node--view-mode-teaser .teaser__image {
      position: static;
      inset-block-start: auto;
      inset-inline-start: auto;
      margin: 0;
      order: 2;
    }

    /* Lay out teaser headings and images as a clean text-left, image-right row. */
    body.path-elasticsearch .view-content .node--view-mode-teaser .teaser__top {
      display: grid;
      grid-template-columns: minmax(0, 1fr) clamp(7rem, 14vw, 9rem);
      gap: 1rem;
      align-items: start;
    }

    /* Let long teaser titles wrap cleanly without pushing the image outward. */
    body.path-elasticsearch .view-content .node--view-mode-teaser .teaser__title {
      min-width: 0;
      flex-basis: auto;
    }

    /* Give teaser images a consistent size and soft rounded card treatment. */
    body.path-elasticsearch .view-content .node--view-mode-teaser .teaser__image img {
      width: 100%;
      height: auto;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      border-radius: 1rem;
    }
  }
conditions_require_all: true
conditions:
  request_path:
    id: request_path
    negate: false
    pages: /elasticsearch
  current_theme:
    id: current_theme
    negate: false
    theme: olivero
contexts: {  }
media: all
preprocess: true
