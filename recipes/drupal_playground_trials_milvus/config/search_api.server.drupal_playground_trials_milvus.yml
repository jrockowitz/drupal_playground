langcode: en
status: true
dependencies:
  module:
    - ai_search
    - ai_vdb_provider_milvus
id: drupal_playground_trials_milvus
name: 'Drupal Playground Trials Milvus'
description: 'Local Milvus server for Clinical Trials AI search.'
backend: search_api_ai_search
backend_config:
  chat_model: gpt-4o-mini
  database: milvus
  database_settings:
    database_name: default
    collection: drupal_playground_trials_milvus
    metric: cosine_similarity
  embeddings_engine: openai__text-embedding-3-small
  embeddings_engine_configuration:
    set_dimensions: true
    dimensions: 1536
  embedding_strategy: contextual_chunks
  embedding_strategy_configuration:
    chunk_size: '2048'
    chunk_min_overlap: '100'
    contextual_content_max_percentage: '30'
    skip_moderation: true
  embedding_strategy_details: ''
  include_raw_embedding_vector: false
