name: 'ClinicalTrials.gov Recipe Fields Setup'
description: 'Adds fixed patient-friendly trial fields and AI automators to the ClinicalTrials.gov setup.'
type: 'Site'
install:
  - custom_field
  - field_group
  - migrate_plus
  - migrate_tools
  - readonly_field_widget
  - ai_automators
  - clinical_trials_gov
  - clinical_trials_gov_report
  - clinical_trials_gov_fields
  - link
config:
  strict: false
  actions:
    clinical_trials_gov.settings:
      setUp:
        query: 'query.cond=Cancer&query.locn=New%20York&filter.overallStatus=RECRUITING%7CNOT_YET_RECRUITING'
