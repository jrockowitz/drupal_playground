prompt: ''
token: "Write one plain-language sentence for a clinical trial teaser for patients and caregivers.\n\nThe sentence must add useful information that is not already obvious from the title. Prefer mentioning who may be eligible when the source supports it. If eligibility is not useful or not available, mention another important detail such as the condition, treatment context, phase, or participation context.\n\nUse plain text only. Do not use HTML. Do not use markdown. Do not use quotation marks. Do not use bullet points. Do not apologize. Do not restate the task. Do not repeat the title.\n\nIf the information is empty, unusable, or too sparse, return only: Additional trial details are not yet available.\n\nPatient-friendly title if available: [node:field_trial_title:value]\nOfficial trial title: [node:clinical-trials-gov:BriefTitle]\nSummary: [node:clinical-trials-gov:BriefSummary]\nDescription: [node:clinical-trials-gov:DetailedDescription]\nEligibility: [node:clinical-trials-gov:EligibilityCriteria]"
