name: 'Drupal Playground AI Devel'
description: >
  Adds AI development tooling to the Drupal Playground AI recipe.
type: 'Site'
recipes:
  - drupal_playground_ai

install:
  - ai_api_explorer
  - ai_assistant_api
  - ai_logging

config:
  import:
    ai_logging: '*'
  strict: false
  actions:
    ai_logging.settings:
      simpleConfigUpdate:
        prompt_logging: true
        prompt_logging_output: 1

