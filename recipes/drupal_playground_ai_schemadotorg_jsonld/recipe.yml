name: 'Drupal Playground AI Schema.org JSON-LD'
description: >
  Installs and configures AI Schema.org JSON-LD for Drupal Playground and adds
  the Schema.org JSON-LD field to all current node bundles.
type: 'Site'

install:
  - ai_schemadotorg_jsonld
  - json_field_widget
  - ai_schemadotorg_jsonld_breadcrumb
  - ai_schemadotorg_jsonld_log
config:
  actions:
    ai_schemadotorg_jsonld.settings:
      addField:
        entity_type: node
        bundles: ['*']
