name: 'Drupal Playground AI'
description: >
  Installs and configures the AI module suite with OpenAI as the default
  provider, plus site building agents and dashboard configuration.
  Prerequisites: keys/openai.key must exist before applying.
type: 'Site'
recipes:
  - drupal_playground_base

install:
  - ai
  - ai_provider_openai
  - ai_external_moderation
  - key
config:
  strict: false
  import:
    ai: '*'
    key: '*'
    dashboard: '*'
  actions:
    ai_provider_openai.settings:
      simpleConfigUpdate:
        api_key: openai
        moderation: true
