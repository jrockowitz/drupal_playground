name: 'Drupal Playground AI'
description: >
  Installs and configures the AI module suite: providers (OpenAI + Anthropic + Gemini),
  site building agents, and dashboard configuration.
  Prerequisites: keys/openai.key, keys/anthropic.key, and keys/gemini.key must exist before applying.
type: 'Site'
recipes:
  - drupal_playground_base

install:
  - ai
  - ai_provider_anthropic
  - ai_provider_openai
  - ai_external_moderation
  - gemini_provider
  - key
config:
  strict: false
  import:
    ai: '*'
    key: '*'
    dashboard: '*'
  actions:
    ai_provider_openai.settings:
      simpleConfigUpdate:
        api_key: openai
        moderation: true
    ai_provider_anthropic.settings:
      simpleConfigUpdate:
        api_key: anthropic
        version: '20240229'
        openai_moderation: true
    gemini_provider.settings:
      simpleConfigUpdate:
        api_key: gemini
