  body:
    -
      value: |-
        <h2>Quick facts</h2>
        <ul>
          <li>Clinical trials study safety, effectiveness, dosing, side effects, and how treatments compare with current care.</li>
          <li>Eligibility criteria determine who can join and often include condition, age, phase, prior treatment, and location.</li>
          <li>Some trials are recruiting now, while others are active but not recruiting, completed, suspended, or withdrawn.</li>
          <li>Participation is voluntary, and people can ask questions about risks, benefits, time commitment, and alternatives before enrolling.</li>
          <li>Not every trial is a treatment trial. Some focus on diagnosis, prevention, symptom management, quality of life, or long-term follow-up.</li>
          <li>ClinicalTrials.gov records often include study summary, status, phase, interventions, age range, locations, and contact details.</li>
        </ul>
        <p>These facts can help patients, caregivers, and medical professionals quickly understand what a trial record is describing before looking more closely at eligibility and study details.</p>
