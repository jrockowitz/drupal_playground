services:

  _defaults:
    autowire: true

  ai_schemadotorg_jsonld.builder:
    class: Drupal\ai_schemadotorg_jsonld\AiSchemaDotOrgJsonLdBuilder
    arguments:
      $aiAutomatorStatusField: '@ai_automator.status_field'

  Drupal\ai_schemadotorg_jsonld\AiSchemaDotOrgJsonLdBuilderInterface:
    alias: ai_schemadotorg_jsonld.builder

  ai_schemadotorg_jsonld.manager:
    class: Drupal\ai_schemadotorg_jsonld\AiSchemaDotOrgJsonLdManager

  Drupal\ai_schemadotorg_jsonld\AiSchemaDotOrgJsonLdManagerInterface:
    alias: ai_schemadotorg_jsonld.manager

  ai_schemadotorg_jsonld.token_resolver:
    class: Drupal\ai_schemadotorg_jsonld\AiSchemaDotOrgJsonLdTokenResolver

  Drupal\ai_schemadotorg_jsonld\AiSchemaDotOrgJsonLdTokenResolverInterface:
    alias: ai_schemadotorg_jsonld.token_resolver

  Drupal\ai_schemadotorg_jsonld\EventSubscriber\AiSchemaDotOrgJsonLdEventSubscriber:
    tags:
      - { name: event_subscriber }

  Drupal\ai_schemadotorg_jsonld\Hook\AiSchemaDotOrgJsonLdFieldHooks:
    autowire: true

  Drupal\ai_schemadotorg_jsonld\Hook\AiSchemaDotOrgJsonLdPageHooks:
    autowire: true

  Drupal\ai_schemadotorg_jsonld\Hook\AiSchemaDotOrgJsonLdTokenHooks:
    autowire: true
