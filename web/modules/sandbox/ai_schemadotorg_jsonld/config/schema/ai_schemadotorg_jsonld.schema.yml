ai_schemadotorg_jsonld.entity_type_settings:
  type: mapping
  label: 'Entity type settings'
  mapping:
    prompt:
      type: text
      label: 'Prompt'
    default_jsonld:
      type: text
      label: 'Default JSON-LD'

ai_schemadotorg_jsonld.settings:
