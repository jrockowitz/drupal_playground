services:

  _defaults:
    autowire: true

  ai_schemadotorg_jsonld_breadcrumb.manager:
    class: Drupal\ai_schemadotorg_jsonld_breadcrumb\AiSchemaDotOrgJsonLdBreadcrumbManager
    arguments:
      - '@renderer'
      - '@breadcrumb'

  Drupal\ai_schemadotorg_jsonld_breadcrumb\AiSchemaDotOrgJsonLdBreadcrumbManagerInterface:
    alias: ai_schemadotorg_jsonld_breadcrumb.manager

  Drupal\ai_schemadotorg_jsonld_breadcrumb\Hook\AiSchemaDotOrgJsonLdBreadcrumbPageHooks:
    autowire: true
