clinical_trials_gov.settings:
  type: config_object
  label: 'ClinicalTrials.gov settings'
  mapping:
    query:
      type: string
      label: 'Query string'
    paths:
      type: sequence
      label: 'Allowed metadata paths'
      sequence:
        type: string
        label: 'Metadata path'
    type:
      type: string
      label: 'Content type machine name'
    field_prefix:
      type: string
      label: 'Field machine name prefix'
    readonly:
      type: boolean
      label: 'Read-only imported fields'
    fields:
      type: sequence
      label: 'Selected field mapping'
      sequence:
        type: string
        label: 'Metadata path'
