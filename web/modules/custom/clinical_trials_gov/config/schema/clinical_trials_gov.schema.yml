clinical_trials_gov.settings:
  type: config_object
  label: "ClinicalTrials.gov settings"
  constraints:
    FullyValidatable: ~
  mapping:
    query:
      type: string
      label: "Query string"
    query_paths:
      type: sequence
      label: "Query-discovered metadata paths"
      sequence:
        type: string
        label: "Query-discovered metadata path"
        constraints:
          NotBlank: []
          ClinicalTrialsGovMetadataPath: []
    title_path:
      type: string
      label: "Title metadata path"
      constraints:
        NotBlank: []
        ClinicalTrialsGovMetadataPath: []
    required_paths:
      type: sequence
      label: "Required metadata paths"
      constraints:
        Count:
          min: 1
      sequence:
        type: string
        label: "Required metadata path"
        constraints:
          NotBlank: []
          ClinicalTrialsGovMetadataPath: []
    type:
      type: string
      label: "Content type machine name"
    field_prefix:
      type: string
      label: "Field machine name prefix"
    view_display_root:
      type: string
      label: "Default view display root field-group format"
      constraints:
        Choice:
          choices:
            - details
            - details_opened
            - fieldset
            - container
            - none
    view_display_component:
      type: string
      label: "Default view display component behavior"
      constraints:
        Choice:
          choices:
            - visible
            - visible_update
            - hidden
    view_display_field_group:
      type: string
      label: "Default view display field-group format"
      constraints:
        Choice:
          choices:
            - details
            - details_opened
            - fieldset
            - container
            - none
    form_display_root:
      type: string
      label: "Default form display root field-group format"
      constraints:
        Choice:
          choices:
            - details
            - details_opened
            - fieldset
            - container
            - none
    form_display_component:
      type: string
      label: "Default form display component behavior"
      constraints:
        Choice:
          choices:
            - visible
            - hidden
            - readonly
    form_display_field_group:
      type: string
      label: "Default form display field-group format"
      constraints:
        Choice:
          choices:
            - details
            - details_opened
            - fieldset
            - container
            - none
    fields:
      type: sequence
      label: "Selected field mapping"
      sequence:
        type: string
        label: "Metadata path"

plugin.plugin_configuration.search_api_processor.clinical_trials_gov_flattened_custom_field_values:
  type: search_api.default_processor_configuration
  label: "ClinicalTrials.gov flattened custom field values processor configuration"
  mapping:
    mappings:
      type: sequence
      label: "Flattened custom field mappings"
      sequence:
        type: mapping
        label: "Flattened custom field mapping"
        mapping:
          property_path:
            type: string
            label: "Derived Search API property path"
          field_name:
            type: string
            label: "Source custom field machine name"
          column_name:
            type: string
            label: "Source custom field property name"
