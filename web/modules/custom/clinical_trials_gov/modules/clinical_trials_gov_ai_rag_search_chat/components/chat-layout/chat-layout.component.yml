'$schema': 'https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/modules/sdc/src/metadata.schema.json'
name: ClinicalTrials.gov Chat Layout
status: stable
description: 'ClinicalTrials.gov two-column layout for AI chat interface'
props:
  type: object
  properties:
    session_id:
      type: string
      title: 'Session ID'
      description: 'Current session ID'
    sessions:
      type: array
      title: 'Sessions'
      description: 'Array of user sessions'
    messages:
      type: array
      title: 'Messages'
      description: 'Array of chat messages'
    retention_days:
      type: integer
      title: 'Retention Days'
      description: 'Number of days chat history is retained'
