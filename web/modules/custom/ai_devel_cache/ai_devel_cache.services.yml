services:
  _defaults:
    autowire: true

  ai_devel_cache.manager:
    class: Drupal\ai_devel_cache\AiDevelCacheManager
  Drupal\ai_devel_cache\AiDevelCacheManagerInterface: '@ai_devel_cache.manager'

  ai_devel_cache.subscriber:
    class: Drupal\ai_devel_cache\EventSubscriber\AiDevelCacheSubscriber
    tags:
      - { name: event_subscriber }
