services:
  _defaults:
    autowire: true

  ai_devel_cache.filesystem_backend:
    class: Drupal\ai_devel_cache\Cache\AiDevelCacheFilesystemBackend
  Drupal\ai_devel_cache\Cache\AiDevelCacheInterface: "@ai_devel_cache.filesystem_backend"

  ai_devel_cache.subscriber:
    class: Drupal\ai_devel_cache\EventSubscriber\AiDevelCacheSubscriber
    tags:
      - { name: event_subscriber }
