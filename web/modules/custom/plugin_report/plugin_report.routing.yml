plugin_report.managers:
  path: '/admin/reports/plugins'
  defaults:
    _controller: '\Drupal\plugin_report\Controller\PluginReportController::managers'
    _title: 'Plugin Report'
  requirements:
    _permission: 'access site reports'

plugin_report.plugins:
  path: '/admin/reports/plugins/{plugin_manager}'
  defaults:
    _controller: '\Drupal\plugin_report\Controller\PluginReportController::plugins'
    _title_callback: '\Drupal\plugin_report\Controller\PluginReportController::title'
  requirements:
    _permission: 'access site reports'
    plugin_manager: '[^/]+'

plugin_report.plugin:
  path: '/admin/reports/plugins/{plugin_manager}/{plugin_id}'
  defaults:
    _controller: '\Drupal\plugin_report\Controller\PluginReportController::plugin'
    _title_callback: '\Drupal\plugin_report\Controller\PluginReportController::pluginTitle'
  requirements:
    _permission: 'access site reports'
    plugin_manager: '[^/]+'
    plugin_id: '[^/]+'
