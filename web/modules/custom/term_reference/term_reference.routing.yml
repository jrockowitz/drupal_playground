term_reference.references:
  path: '/taxonomy/term/{taxonomy_term}/references/{field}'
  defaults:
    _form: '\Drupal\term_reference\Form\TermReferenceForm'
    _title_callback: '\Drupal\term_reference\Form\TermReferenceForm::title'
    field: ''
  requirements:
    _custom_access: '\Drupal\term_reference\Form\TermReferenceForm::access'
    field: '[a-z0-9_]+\.[a-z0-9_]+'
  options:
    _admin_route: TRUE
    parameters:
      taxonomy_term:
        type: entity:taxonomy_term
